name: Docker Build

on:
  workflow_call:
    outputs:
      image_tag:
        value: ${{ jobs.build.outputs.image_tag }}
      image_repository:
        value: ${{ jobs.build.outputs.image_repository }}
      failure_stage:
        value: ${{ jobs.build.outputs.failure_stage }}
      report_url:
        value: ${{ jobs.build.outputs.report_url }}

permissions:
  contents: read
  id-token: write
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: azure-test

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_repository: ${{ steps.meta.outputs.image }}
      failure_stage: ${{ steps.failure.outputs.stage }}
      report_url: ${{ steps.report.outputs.url }}

    env:
      ACR_NAME: ${{ vars.AZURE_TEST_ACR_NAME }}
      IMAGE_REPOSITORY: opslora-invoice-service

    steps:
      - uses: actions/checkout@v4

      - id: report
        run: |
          echo "url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Azure login
        id: azure_login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_TEST_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_TEST_SUBSCRIPTION_ID }}

      - id: meta
        name: Resolve ACR image metadata
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ACR_NAME}" ]; then
            echo "Missing GitHub environment variable AZURE_TEST_ACR_NAME." >&2
            exit 1
          fi
          login_server="$(az acr show --name "${ACR_NAME}" --query loginServer -o tsv)"
          if [ -z "${login_server}" ]; then
            echo "Could not resolve ACR login server for ${ACR_NAME}." >&2
            exit 1
          fi
          tag="azure-test-${{ github.run_number }}-${GITHUB_SHA::7}"
          image="${login_server}/${IMAGE_REPOSITORY}"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        id: acr_login
        shell: bash
        run: az acr login --name "${ACR_NAME}"

      - name: Build image
        id: build
        run: |
          docker buildx build             --load             -t ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}             .

      - name: Install Trivy
        id: install_trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh           | sudo sh -s -- -b /usr/local/bin
          trivy --version

      - name: Scan the image with Trivy
        id: scan
        continue-on-error: true
        run: |
          trivy image             --vuln-type library             --severity HIGH,CRITICAL             --format sarif             --output trivy-report.sarif             --exit-code 1             ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}

      - name: Upload SARIF to GitHub Security
        if: ${{ always() && hashFiles('trivy-report.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-report.sarif

      - name: Stop on vulnerability
        if: ${{ steps.scan.outcome == 'failure' }}
        run: |
          echo "Trivy scan failed. Blocking image push."
          exit 1

      - name: Push image
        id: push
        run: |
          set -euo pipefail
          docker tag "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}" "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.short_sha }}"
          for image_tag in "${{ steps.meta.outputs.tag }}" "${{ steps.meta.outputs.short_sha }}"; do
            for i in 1 2 3; do
              docker push "${{ steps.meta.outputs.image }}:${image_tag}" && break || sleep 5
            done
          done

      - id: failure
        if: always()
        run: |
          if [ "${{ steps.azure_login.outcome }}" = "failure" ]; then
            echo "stage=azure_login_failed" >> $GITHUB_OUTPUT
          elif [ "${{ steps.acr_login.outcome }}" = "failure" ]; then
            echo "stage=acr_login_failed" >> $GITHUB_OUTPUT
          elif [ "${{ steps.build.outcome }}" = "failure" ]; then
            echo "stage=build_failed" >> $GITHUB_OUTPUT
          elif [ "${{ steps.scan.outcome }}" = "failure" ]; then
            echo "stage=trivy_scan_failed" >> $GITHUB_OUTPUT
          elif [ "${{ steps.push.outcome }}" = "failure" ]; then
            echo "stage=push_failed" >> $GITHUB_OUTPUT
          else
            echo "stage=success" >> $GITHUB_OUTPUT
          fi
