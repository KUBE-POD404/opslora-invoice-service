apiVersion: apps/v1
kind: Deployment
metadata:
  name: invoice-deployment
  namespace: opslora-test-ns  

spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: invoice-microservice
  template:
    metadata:
      labels:
        app: invoice-microservice
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: invoice-microservice
              topologyKey: kubernetes.io/hostname

      containers:
      - name: invoice-container
        image: kubectlandchill/sales-invoice-service:v1.1.0

        ports:
        - containerPort: 3000

        envFrom:
        - secretRef:
            name: backend-secret
        - configMapRef:
            name: backend-config

        resources:
          requests:
            cpu: "100m"
            memory: "150Mi"
            ephemeral-storage: "200Mi"
          limits:
            cpu: "200m"
            memory: "300Mi"
            ephemeral-storage: "500Mi"

        readinessProbe:
          httpGet:
            path: /api/v1/invoices/health
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 2
          successThreshold: 2
          failureThreshold: 3

        livenessProbe:
          httpGet:
            path: /api/v1/invoices/health
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 0
          periodSeconds: 15
          timeoutSeconds: 2
          failureThreshold: 4